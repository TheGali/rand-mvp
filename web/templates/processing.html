{% extends "base.html" %}
{% block title %}Processing — RAND Engineering{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8" x-data="processingApp()" x-init="startStream()">

    <div class="bg-white rounded-xl shadow-sm border p-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-xl font-bold text-gray-900">Processing Survey</h2>
                <p class="text-gray-500 text-sm mt-1">{{ job.building_name or job.filename }} &mdash; <span x-text="total"></span> observations</p>
            </div>
            <template x-if="complete">
                <a href="/dashboard/{{ job.id }}" class="bg-rand-black text-white font-medium rounded-lg px-4 py-2 hover:bg-opacity-90 transition text-sm">
                    Review Dashboard &rarr;
                </a>
            </template>
        </div>

        <!-- Progress bar -->
        <div class="mb-6">
            <div class="flex justify-between text-sm text-gray-600 mb-1">
                <span x-text="statusText"></span>
                <span x-text="current + ' / ' + total"></span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div
                    class="h-3 rounded-full transition-all duration-500"
                    :class="complete ? 'bg-green-500' : 'bg-rand-red progress-pulse'"
                    :style="'width: ' + percent + '%'"
                ></div>
            </div>
        </div>

        <!-- Cost tally -->
        <div class="mb-6 flex items-center gap-3 text-sm">
            <div class="flex items-center gap-1.5 bg-gray-50 border rounded-lg px-3 py-2">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span class="text-gray-500">Est. API cost:</span>
                <span class="font-semibold text-gray-800" x-text="'$' + costUsd.toFixed(4)"></span>
            </div>
        </div>

        <!-- Log -->
        <div class="bg-gray-50 rounded-lg border p-4 max-h-96 overflow-y-auto font-mono text-sm" x-ref="logPanel">
            <template x-for="entry in log" :key="entry.id">
                <div class="py-1 flex items-center gap-2">
                    <span class="text-gray-400 w-16 text-right shrink-0" x-text="'[' + entry.current + '/' + entry.total + ']'"></span>
                    <span class="text-gray-700" x-text="'Obs ' + entry.obs_number"></span>
                    <span class="ml-auto text-xs font-medium px-2 py-0.5 rounded-full"
                        :class="entry.status === 'OK' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                        x-text="entry.status"
                    ></span>
                </div>
            </template>
            <template x-if="processing && !complete">
                <div class="py-1 flex items-center gap-2 text-gray-400">
                    <span class="w-16 text-right shrink-0">&nbsp;</span>
                    <span class="inline-block animate-pulse">Processing next observation...</span>
                </div>
            </template>
        </div>

        <!-- Error state -->
        <template x-if="error">
            <div class="mt-4 bg-red-50 text-red-700 rounded-lg px-4 py-3 text-sm" x-text="error"></div>
        </template>
    </div>
</div>

<script>
function processingApp() {
    return {
        current: 0,
        total: {{ job.observation_count }},
        percent: 0,
        complete: false,
        processing: false,
        error: null,
        statusText: 'Connecting...',
        log: [],
        logId: 0,
        costUsd: 0.0,

        startStream() {
            // If already completed, redirect
            if ('{{ job.status }}' === 'completed') {
                window.location.href = '/dashboard/{{ job.id }}';
                return;
            }

            this.processing = true;
            this.statusText = 'Starting AI processing...';

            const evtSource = new EventSource('/stream/{{ job.id }}');

            evtSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'progress') {
                    this.current = data.current;
                    this.total = data.total;
                    this.percent = Math.round((data.current / data.total) * 100);
                    this.statusText = `Processing observation ${data.obs_number}...`;
                    if (data.cost_usd !== undefined) {
                        this.costUsd = data.cost_usd;
                    }
                    this.log.push({
                        id: this.logId++,
                        current: data.current,
                        total: data.total,
                        obs_number: data.obs_number,
                        status: data.status,
                    });
                    // Auto-scroll
                    this.$nextTick(() => {
                        this.$refs.logPanel.scrollTop = this.$refs.logPanel.scrollHeight;
                    });
                }

                if (data.type === 'complete') {
                    this.complete = true;
                    this.processing = false;
                    this.percent = 100;
                    this.statusText = 'Processing complete!';
                    evtSource.close();
                }

                if (data.type === 'error') {
                    this.error = data.message;
                    this.processing = false;
                    evtSource.close();
                }
            };

            evtSource.onerror = () => {
                if (!this.complete) {
                    this.error = 'Connection lost. Refresh the page to check status.';
                    this.processing = false;
                }
                evtSource.close();
            };
        }
    };
}
</script>
{% endblock %}
