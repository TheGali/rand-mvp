<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAND Engineering{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rand: {
                            black: '#1A1A1A',
                            red: '#E21836',
                            light: '#f5f5f5',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    {% block nav %}
    <nav class="bg-rand-black text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="flex items-center gap-4 hover:opacity-80 transition">
                <img src="/static/img/logo.png" alt="RAND" class="h-7">
                <span class="text-gray-400 text-sm hidden sm:inline">Physical Condition Survey</span>
            </a>
            <div class="flex items-center gap-4">
                {% block nav_actions %}{% endblock %}
                <form method="post" action="/logout" class="inline">
                    <button type="submit" class="text-gray-300 hover:text-white text-sm transition">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    {% endblock %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
