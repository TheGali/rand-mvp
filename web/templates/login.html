<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — RAND Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rand: { black: '#1A1A1A', red: '#E21836' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
        <div class="text-center mb-6">
            <img src="/static/img/logo.png" alt="RAND" class="h-10 mx-auto mb-3">
            <p class="text-gray-500 text-sm">Physical Condition Survey Tool</p>
        </div>

        {% if error %}
        <div class="bg-red-50 text-red-700 text-sm rounded-lg px-4 py-2 mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                autofocus
                required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-rand-red focus:border-transparent"
                placeholder="Enter password"
            >
            <button
                type="submit"
                class="w-full bg-rand-black text-white font-medium rounded-lg py-2 hover:bg-opacity-90 transition"
            >
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
